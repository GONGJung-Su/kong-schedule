<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KONG'S 일정 관리</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f3f4f6;color:#1f2937;height:100vh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}

/* TOPBAR */
.topbar{background:white;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;height:54px;padding:0 16px;gap:12px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:8px;width:210px;flex-shrink:0}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.logo-text{font-size:.95rem;font-weight:700;color:#1f2937}
.topbar-nav{display:flex;align-items:center;gap:6px}
.nav-btn{background:none;border:1px solid #e5e7eb;color:#374151;padding:5px 11px;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:500}
.nav-btn:hover{background:#f9fafb}
.cal-title{font-size:1rem;font-weight:700;color:#111827;min-width:100px;text-align:center}
.topbar-actions{display:flex;align-items:center;gap:8px;margin-left:4px}
.btn-today{background:none;border:1px solid #e5e7eb;color:#374151;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:500}
.btn-today:hover{background:#f9fafb}
.btn-add-ev{background:#4f46e5;color:white;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:4px}
.btn-add-ev:hover{background:#4338ca}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.icon-btn{background:none;border:1px solid #e5e7eb;color:#6b7280;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.78rem}
.icon-btn:hover{background:#f9fafb;color:#374151}
.view-toggle{display:flex;background:#f3f4f6;border-radius:6px;padding:2px;gap:1px}
.vt-btn{padding:5px 13px;border-radius:5px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;background:none;color:#6b7280;transition:all .15s}
.vt-btn.active{background:white;color:#4f46e5;box-shadow:0 1px 3px rgba(0,0,0,.12)}

/* BODY */
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;background:white;border-right:1px solid #e5e7eb;padding:14px;flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.main{flex:1;overflow:hidden;background:white;display:flex;flex-direction:column}

/* SIDEBAR */
.sb-label{font-size:.65rem;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.mini-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.mini-mo{font-size:.8rem;font-weight:600;color:#374151}
.mini-nav{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:.88rem;padding:1px 5px;border-radius:4px}
.mini-nav:hover{background:#f3f4f6;color:#374151}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mini-dow{text-align:center;font-size:.6rem;color:#9ca3af;font-weight:600;padding:2px 0}
.mini-day{text-align:center;font-size:.7rem;cursor:pointer;border-radius:50%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;color:#374151;position:relative;transition:background .1s}
.mini-day:hover{background:#ede9fe}
.mini-day.m-today{background:#4f46e5;color:white;font-weight:700}
.mini-day.m-sel:not(.m-today){background:#ede9fe;color:#4f46e5;font-weight:700}
.mini-day.m-other{color:#d1d5db}
.mini-day.m-sun:not(.m-today){color:#ef4444}
.mini-day.m-sat:not(.m-today){color:#3b82f6}
.mini-day.m-dot::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:#4f46e5}
.mini-day.m-today.m-dot::after{background:white}
.up-list{display:flex;flex-direction:column;gap:4px}
.up-item{padding:5px 7px;border-radius:5px;border-left:3px solid;background:#f9fafb;cursor:pointer;transition:background .1s}
.up-item:hover{background:#f3f4f6}
.up-t{font-size:.74rem;font-weight:600;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.up-d{font-size:.66rem;color:#9ca3af;margin-top:1px}
.no-up{font-size:.74rem;color:#9ca3af;text-align:center;padding:10px}
.team-indicator{font-size:.7rem;padding:3px 8px;border-radius:10px;background:#ede9fe;color:#4f46e5;font-weight:600;text-align:center}

/* CALENDAR */
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);background:white;border-bottom:1px solid #e5e7eb;flex-shrink:0}
.cal-hdr-cell{text-align:center;padding:8px 0;font-size:.68rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.4px}
.cal-hdr-cell.h-sun{color:#ef4444}
.cal-hdr-cell.h-sat{color:#3b82f6}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(5,1fr);flex:1;overflow:hidden}
.cal-cell{border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;padding:4px;cursor:pointer;overflow:hidden;transition:background .1s;min-height:0}
.cal-cell:hover{background:#f8faff!important}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.c-other{background:#fafafa}
.cal-cell.c-today{background:#f5f3ff}
.cal-cell.c-sel{background:#eef2ff}
.day-num{font-size:.78rem;font-weight:700;width:23px;height:23px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:1px}
.day-num.n-today{background:#4f46e5;color:white}
.day-num.n-red{color:#ef4444}
.day-num.n-sat{color:#3b82f6}
.cal-cell.c-other .day-num{color:#d1d5db}
.day-sub{font-size:.58rem;color:#9ca3af;margin-bottom:2px;margin-left:1px;line-height:1.2}
.day-sub.hol{color:#ef4444;font-weight:600}

/* EVENT PILLS */
.ev-pill{font-size:.7rem;padding:1px 5px;margin-bottom:2px;border-radius:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;border:1px solid transparent;font-weight:500;transition:background .1s,border-color .1s}
.ev-pill:hover,.ev-pill.ev-sel{background:#dbeafe!important;border-color:#93c5fd!important;color:#1e40af!important}
.ev-pill.ev-none{background:transparent;border-color:transparent;color:#374151}
.ev-pill.ev-none:hover,.ev-pill.ev-none.ev-sel{background:#dbeafe!important;border-color:#93c5fd!important;color:#1e40af!important}
.ev-pill.sp-start{border-radius:3px 0 0 3px;margin-right:-5px;padding-right:0}
.ev-pill.sp-mid{border-radius:0;margin-left:-5px;margin-right:-5px;padding-left:2px;padding-right:0}
.ev-pill.sp-end{border-radius:0 3px 3px 0;margin-left:-5px;padding-left:2px}
.more-ev{font-size:.65rem;color:#6b7280;padding:0 3px;cursor:pointer;user-select:none}
.more-ev:hover{color:#4f46e5}
.more-pop-float{position:fixed;z-index:9999;background:white;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.15);padding:5px;min-width:150px;max-width:200px;display:flex;flex-direction:column;gap:2px;pointer-events:auto}
.more-pop-item{font-size:.7rem;padding:3px 6px;border-radius:4px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.more-pop-item:hover{background:#dbeafe;color:#1e40af}

/* 2-WEEK */
.tw-week-hdr{display:grid;grid-template-columns:repeat(7,1fr);background:#f9fafb;border-bottom:1px solid #e5e7eb}
.tw-hdr-cell{text-align:center;padding:7px 4px;border-right:1px solid #f0f0f0}
.tw-hdr-cell:last-child{border-right:none}
.tw-dow{font-size:.66rem;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px}
.tw-date{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:.8rem;font-weight:700;cursor:pointer}
.tw-date.tw-today{background:#4f46e5;color:white}
.tw-date.tw-sel:not(.tw-today){background:#ede9fe;color:#4f46e5}
.tw-body{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:2px solid #e5e7eb}
.tw-cell{min-height:90px;border-right:1px solid #f0f0f0;padding:4px;cursor:pointer;transition:background .1s}
.tw-cell:hover{background:#f8faff!important}
.tw-cell.tw-today-c{background:#f5f3ff}
.tw-cell.tw-sel-c{background:#eef2ff}
.tw-cell:last-child{border-right:none}

/* DAY VIEW */
.dv-wrap{padding:16px 20px}
.dv-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #e5e7eb;flex-wrap:wrap}
.dv-date{font-size:1rem;font-weight:700;color:#111827}
.dv-lunar{font-size:.74rem;color:#6b7280}
.dv-hol{font-size:.74rem;color:#ef4444;font-weight:600}
.dv-badge{font-size:.7rem;padding:2px 8px;border-radius:10px;background:#ede9fe;color:#4f46e5;font-weight:600}
.dv-list{display:flex;flex-direction:column;gap:7px}
.dv-ev{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:9px;cursor:pointer;border-left:4px solid #e5e7eb;background:#f9fafb;transition:all .1s}
.dv-ev:hover{background:#dbeafe!important;border-left-color:#3b82f6!important}
.dv-time{font-size:.72rem;font-weight:600;color:#6b7280;white-space:nowrap;min-width:85px;padding-top:1px}
.dv-info{flex:1}
.dv-title{font-size:.9rem;font-weight:600;color:#111827}
.dv-memo{font-size:.74rem;color:#6b7280;margin-top:2px;line-height:1.4}
.dv-img{width:44px;height:44px;object-fit:cover;border-radius:5px;flex-shrink:0}
.dv-empty{text-align:center;padding:40px;color:#9ca3af}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(2px)}
.modal{background:white;border-radius:13px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mu .18s ease}
.modal.wide{max-width:560px}
@keyframes mu{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.modal-hd{padding:16px 18px 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1;border-bottom:1px solid transparent}
.modal-hd h2{font-size:.95rem;font-weight:700;color:#111827}
.mc{background:none;border:none;font-size:1.1rem;color:#9ca3af;cursor:pointer;padding:3px;border-radius:4px;line-height:1}
.mc:hover{background:#f3f4f6;color:#374151}
.modal-body{padding:14px 18px;display:flex;flex-direction:column;gap:11px}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:.74rem;font-weight:600;color:#374151}
.fi{border:1.5px solid #e5e7eb;border-radius:6px;padding:7px 10px;font-size:.85rem;color:#111827;outline:none;font-family:inherit;width:100%;transition:border-color .15s}
.fi:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
textarea.fi{resize:vertical;min-height:60px}
select.fi{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
/* color picker */
.cp-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cp-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.cp-swatch:hover{transform:scale(1.15)}
.cp-swatch.cp-sel{border-color:#374151;box-shadow:0 0 0 2px white inset}
.cp-none{background:white;border:1.5px dashed #d1d5db!important}
.cp-none.cp-sel{border-color:#4f46e5!important}
/* toggle */
.mtog{display:flex;align-items:center;gap:7px;cursor:pointer}
.mtog input{width:14px;height:14px;accent-color:#4f46e5;cursor:pointer}
/* photo */
.photo-area{border:1.5px dashed #d1d5db;border-radius:7px;padding:10px;text-align:center;cursor:pointer;color:#6b7280;font-size:.77rem;transition:border-color .15s}
.photo-area:hover{border-color:#4f46e5;color:#4f46e5}
.ph-thumb{width:72px;height:56px;object-fit:cover;border-radius:5px;cursor:pointer}
.modal-ft{padding:11px 18px;display:flex;gap:7px;justify-content:flex-end;border-top:1px solid #f3f4f6;position:sticky;bottom:0;background:white}
.btn{padding:7px 15px;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.bp{background:#4f46e5;color:white}.bp:hover{background:#4338ca}
.bs{background:#f3f4f6;color:#374151}.bs:hover{background:#e5e7eb}
.bd{background:#fee2e2;color:#dc2626}.bd:hover{background:#fecaca}
/* detail */
.det-bar{height:4px;border-radius:13px 13px 0 0}
.det-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;font-size:.82rem;color:#374151}
.det-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:9px;font-size:.72rem;font-weight:600}
.det-memo{background:#f9fafb;border-radius:6px;padding:7px 9px;font-size:.8rem;line-height:1.55;white-space:pre-wrap;margin-top:3px}
.det-img{max-width:100%;border-radius:7px;margin-top:5px}
/* settings */
.s-section{margin-bottom:14px}
.s-title{font-size:.76rem;font-weight:700;color:#374151;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #f3f4f6}
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.tog-label{font-size:.82rem;color:#374151}
.sw{position:relative;width:38px;height:20px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-sl{position:absolute;cursor:pointer;inset:0;background:#d1d5db;border-radius:20px;transition:.2s}
.sw-sl::before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s}
.sw input:checked+.sw-sl{background:#4f46e5}
.sw input:checked+.sw-sl::before{transform:translateX(18px)}
/* team */
.team-list{display:flex;flex-direction:column;gap:7px}
.t-item{padding:9px 11px;border:1.5px solid #e5e7eb;border-radius:8px;cursor:pointer;transition:all .15s}
.t-item:hover{border-color:#4f46e5;background:#f5f3ff}
.t-item.t-active{border-color:#4f46e5;background:#ede9fe}
.m-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:white;flex-shrink:0}
/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1f2937;color:white;padding:8px 16px;border-radius:7px;font-size:.8rem;font-weight:500;z-index:2000;animation:tf 2.5s ease forwards;white-space:nowrap}
@keyframes tf{0%{opacity:0;transform:translateX(-50%) translateY(8px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:3px}
/* ── LOGIN ── */
.login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#eef2ff,#f5f3ff)}
.login-card{background:white;border-radius:18px;padding:44px 36px;text-align:center;box-shadow:0 10px 40px rgba(79,70,229,.13);max-width:340px;width:90%}
.login-icon{font-size:2.8rem;margin-bottom:14px}
.login-title{font-size:1.25rem;font-weight:800;color:#1f2937;margin-bottom:8px}
.login-sub{font-size:.82rem;color:#6b7280;line-height:1.7;margin-bottom:20px;white-space:pre-line}
.login-field{text-align:left;margin-bottom:12px}
.login-label{font-size:.78rem;font-weight:600;color:#374151;display:block;margin-bottom:4px}
.login-input{width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.9rem;outline:none;font-family:inherit;color:#1f2937;transition:border-color .15s;box-sizing:border-box}
.login-input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.login-error{font-size:.78rem;color:#ef4444;background:#fef2f2;border-radius:7px;padding:8px 10px;margin-bottom:12px;text-align:left;display:none}
.login-btn{background:#4f46e5;color:white;border:none;padding:12px 0;border-radius:9px;font-size:.9rem;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;font-family:inherit;margin-top:8px}
.login-btn:hover{background:#4338ca}
.user-badge{display:flex;align-items:center;gap:5px;background:#f3f4f6;border-radius:20px;padding:3px 10px 3px 8px;font-size:.75rem;font-weight:600;color:#374151}
.admin-badge{background:#ede9fe;color:#4f46e5;font-size:.6rem;padding:1px 5px;border-radius:8px;font-weight:700;margin-left:2px}
/* ── MOBILE 전용 2주 그리드 ── */
.mb-topbar{display:flex;align-items:center;height:44px;padding:0 6px;gap:3px;background:white;border-bottom:1px solid #e5e7eb;flex-shrink:0;overflow:hidden}
.mb-nav-btn{background:none;border:1px solid #e5e7eb;color:#374151;padding:4px 7px;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:500;white-space:nowrap;flex-shrink:0}
.mb-title{flex:1;text-align:center;font-size:.78rem;font-weight:700;color:#111827;min-width:0;overflow:hidden;white-space:nowrap}
.mb-today-btn{background:none;border:1px solid #e5e7eb;color:#374151;padding:4px 7px;border-radius:6px;cursor:pointer;font-size:.75rem;flex-shrink:0}
.mb-add-btn{background:#4f46e5;color:white;border:none;padding:4px 9px;border-radius:6px;cursor:pointer;font-size:.75rem;font-weight:600;white-space:nowrap;flex-shrink:0}
.mb-icon-btn{background:none;border:1px solid #e5e7eb;padding:4px 7px;border-radius:6px;cursor:pointer;font-size:.8rem;flex-shrink:0}
.mb-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(7,1fr);overflow:hidden;background:#f0f0f0;gap:1px}
.mb-cell{background:white;padding:3px 4px;cursor:pointer;overflow:hidden;transition:background .1s;min-height:0;display:flex;flex-direction:column}
.mb-cell:hover{background:#f8faff!important}
.mb-cell.mb-today{background:#f5f3ff!important}
.mb-cell.mb-sel:not(.mb-today){background:#eef2ff!important}
.mb-day-hd{display:flex;align-items:center;gap:2px;margin-bottom:2px;flex-shrink:0}
.mb-dow{font-size:.58rem;font-weight:700;letter-spacing:.3px}
.mb-dnum{font-size:.72rem;font-weight:700;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mb-dnum.is-today{background:#4f46e5;color:white}
.mb-dnum.is-red{color:#ef4444}
.mb-dnum.is-sat{color:#3b82f6}
/* 모달 - 모바일 */
@media(max-width:700px){
  .modal{max-width:100%!important;border-radius:14px 14px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:90vh;margin:0}
  .overlay{align-items:flex-end;padding:0}
  .form-row{grid-template-columns:1fr}
  .modal-body{padding:12px 14px}
}
</style>

  try{const s=localStorage.getItem('ks_auth_users');users=s?JSON.parse(s):[];}catch{}
  // admin 계정은 어느 브라우저에서도 항상 존재 보장
  if(!Array.isArray(users))users=[];
  if(!users.find(u=>u.username==='admin')){
    users.unshift({username:'admin',password:'8432',role:'admin'});
    localStorage.setItem('ks_auth_users',JSON.stringify(users));
  }
  return users;
}
function saveUsers(u){
  localStorage.setItem('ks_auth_users',JSON.stringify(u));
  if(fDb)fDb.ref('kong_app/users').set(u).catch(()=>{});
}
function getSession(){return JSON.parse(sessionStorage.getItem('ks_session')||'null');}
function setSession(u){sessionStorage.setItem('ks_session',JSON.stringify(u));}
function clearSession(){sessionStorage.removeItem('ks_session');}
let authUser=getSession();
function doLogin(username,password){
  const users=getUsers();
  const u=users.find(x=>x.username===username&&x.password===password);
  if(!u)return null;
  const s={username:u.username,role:u.role};
  setSession(s);authUser=s;return s;
}
function doLogout(){clearSession();authUser=null;events=[];teams=[];curTeam=null;showLoginScreen();}
function isAdmin(){return authUser&&authUser.role==='admin';}
function showLoginScreen(){
  const root=document.getElementById('app');
  root.innerHTML='';
  const errEl=document.createElement('div');
  errEl.className='login-error';
  const lastUser=localStorage.getItem('ks_last_user')||'';
  const unEl=h('input',{class:'login-input',placeholder:'사용자명',type:'text',value:lastUser});
  const pwEl=h('input',{class:'login-input',placeholder:'비밀번호',type:'password'});
  function tryLogin(){
    const u=unEl.value.trim(),p=pwEl.value;
    if(!u||!p){errEl.textContent='사용자명과 비밀번호를 입력하세요.';errEl.style.display='block';return;}
    const s=doLogin(u,p);
    if(!s){errEl.textContent='사용자명 또는 비밀번호가 올바르지 않습니다.';errEl.style.display='block';pwEl.value='';return;}
    localStorage.setItem('ks_last_user',u);
    // 로그인 성공 → localStorage 먼저 로딩
    events=ls('ev',[]);
    settings=ls('st',{showLunar:true,showHol:true});
    teams=ls('teams',[]);
    curTeam=ls('curTeam',null);
    // curUser.name을 로그인 사용자명으로 동기화
    curUser=ls('curUser',{id:uid(),name:s.username,color:'#4f46e5'});
    if(!curUser.id){curUser.id=uid();}
    if(curUser.name!==s.username){curUser.name=s.username;}
    ss('curUser',curUser);
    // Firebase에서 최신 데이터 동기화
    if(fDb){
      btn.disabled=true;btn.textContent='동기화 중...';
      Promise.all([
        fDb.ref('kong_app/events/'+s.username).get(),
        fDb.ref('kong_app/teams').get()
      ]).then(([evSnap,tmSnap])=>{
        if(evSnap.exists()&&Array.isArray(evSnap.val())){events=evSnap.val();ss('ev',events);}
        if(tmSnap.exists()&&Array.isArray(tmSnap.val())){teams=tmSnap.val();ss('teams',teams);}
        render();
      }).catch(()=>render());
    }else{render();}
  }
  pwEl.addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
  unEl.addEventListener('keydown',e=>{if(e.key==='Enter')pwEl.focus();});
  const btn=h('button',{class:'login-btn',onClick:tryLogin},h('span',{},'🔑'),'로그인');
  const card=h('div',{class:'login-card'},
    h('div',{class:'login-icon'},'📅'),
    h('div',{class:'login-title'},"KONG'S 일정 관리"),
    h('div',{class:'login-sub'},'사용자명과 비밀번호를 입력하세요.'),
    errEl,
    h('div',{class:'login-field'},h('label',{class:'login-label'},'사용자명'),unEl),
    h('div',{class:'login-field'},h('label',{class:'login-label'},'비밀번호'),pwEl),
    btn
  );
  root.appendChild(h('div',{class:'login-wrap'},card));
  setTimeout(()=>{if(lastUser)pwEl.focus();else unEl.focus();},100);
}

// ── LUNAR DATA 2020-2030 ───────────────────────────────────
const LY={
  2020:{ny:'2020-01-25',m:[30,29,30,29,30,29,30,30,29,30,29,30],lp:4,ld:29},
  2021:{ny:'2021-02-12',m:[29,30,29,30,29,30,29,29,30,29,30,30],lp:0,ld:0},
  2022:{ny:'2022-02-01',m:[30,29,30,29,30,30,29,30,29,30,29,30],lp:0,ld:0},
  2023:{ny:'2023-01-22',m:[29,30,29,30,29,30,30,29,30,29,30,29],lp:2,ld:29},
  2024:{ny:'2024-02-10',m:[29,30,29,29,30,29,30,29,30,30,29,30],lp:0,ld:0},
  2025:{ny:'2025-01-29',m:[30,29,30,29,30,29,30,29,29,30,29,30],lp:6,ld:30},
  2026:{ny:'2026-02-17',m:[29,30,29,30,29,30,29,30,29,30,29,30],lp:0,ld:0},
  2027:{ny:'2027-02-06',m:[30,29,30,29,30,29,30,29,30,29,30,29],lp:5,ld:30},
  2028:{ny:'2028-01-26',m:[30,30,29,30,29,30,29,29,30,29,30,29],lp:0,ld:0},
  2029:{ny:'2029-02-13',m:[30,29,30,30,29,30,29,30,29,30,29,29],lp:0,ld:0},
  2030:{ny:'2030-02-03',m:[30,29,30,29,30,30,29,30,29,30,29,30],lp:3,ld:29}
};
function solarToLunar(ds){
  let d=parseD(ds),ly=d.getFullYear();
  let data=LY[ly];if(!data)return null;
  let ny=parseD(data.ny);
  if(d<ny){ly--;data=LY[ly];if(!data)return null;ny=parseD(data.ny);}
  let diff=Math.round((d-ny)/86400000);
  let mo=1,day=1,leap=false;
  const{m,lp,ld}=data;
  for(let i=0;i<12;i++){
    if(diff<m[i]){mo=i+1;day=diff+1;break;}
    diff-=m[i];
    if(lp>0&&i+1===lp){if(diff<ld){mo=i+1;day=diff+1;leap=true;break;}diff-=ld;}
    if(i===11){mo=12;day=diff+1;}
  }
  return{y:ly,mo,day,leap};
}
function lunarStr(l){if(!l)return'';return(l.leap?'윤':'')+l.mo+'/'+l.day;}

// ── KOREAN HOLIDAYS ────────────────────────────────────────
const SOL_HOL={'01-01':'신정','03-01':'삼일절','05-05':'어린이날','06-06':'현충일',
  '08-15':'광복절','10-03':'개천절','10-09':'한글날','12-25':'크리스마스'};
const LUN_HOL={'1-1':'설날','1-2':'설날','12-30':'설날연휴','4-8':'부처님오신날',
  '8-14':'추석연휴','8-15':'추석','8-16':'추석연휴'};
function getHol(ds){
  const mmdd=ds.slice(5);
  if(SOL_HOL[mmdd])return SOL_HOL[mmdd];
  const l=solarToLunar(ds);
  if(l&&!l.leap){const k=l.mo+'-'+l.day;if(LUN_HOL[k])return LUN_HOL[k];}
  return null;
}
function isRedDay(ds){const d=parseD(ds);return d.getDay()===0||!!getHol(ds);}

function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtDisp(s){const d=parseD(s);return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DOWS[d.getDay()]})`;}
function addD(ds,n){const d=parseD(ds);d.setDate(d.getDate()+n);return fmt(d);}
function wkStart(ds){const d=parseD(ds);d.setDate(d.getDate()-d.getDay());return fmt(d);}

// ── MORE-EV 팝업 생성 (공통) ─────────────────────────────────
function createMoreEl(hidden){
  const more=document.createElement('div');
  more.className='more-ev';
  more.textContent=`+${hidden.length}개 더`;
  more.addEventListener('click',ev=>ev.stopPropagation());
  more.addEventListener('mouseenter',()=>{
    let pop=document.getElementById('__more_pop__');
    if(!pop){
      pop=document.createElement('div');pop.id='__more_pop__';pop.className='more-pop-float';
      pop.addEventListener('mouseleave',()=>removePop());
      document.body.appendChild(pop);
    }
    pop.innerHTML='';
    hidden.forEach(e=>{
      const item=document.createElement('div');
      item.className='more-pop-item';
      item.textContent=(e.startTime?e.startTime+' ':'')+e.title;
      if(e.emphasis&&e.color){item.style.borderLeft='3px solid '+e.color;item.style.paddingLeft='5px';}
      item.addEventListener('click',ev=>{ev.stopPropagation();removePop();openDetail(e);});
      pop.appendChild(item);
    });
    const r=more.getBoundingClientRect();
    pop.style.display='flex';
    const pw=pop.offsetWidth||200,ph=pop.offsetHeight||100;
    let left=r.left,top=r.bottom+4;
    if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
    if(top+ph>window.innerHeight-8)top=r.top-ph-4;
    pop.style.left=Math.max(4,left)+'px';
    pop.style.top=Math.max(4,top)+'px';
  });
  more.addEventListener('mouseleave',ev=>{
    const pop=document.getElementById('__more_pop__');
    if(pop&&!pop.matches(':hover'))removePop();
  });
  return more;
}

// 셀 실제 높이 기반으로 넘치는 일정 숨기고 +N더 표시
function adjustMonthOverflow(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('.cal-cell').forEach(cell=>{
      if(!cell._dayEvs||cell._dayEvs.length===0)return;
      const pills=Array.from(cell.querySelectorAll('.ev-pill'));
      if(pills.length===0)return;
      // 기존 more-ev 제거 후 재계산
      cell.querySelectorAll('.more-ev').forEach(m=>m.remove());
      // 모두 표시 상태로 초기화
      pills.forEach(p=>p.style.display='');
      const cellRect=cell.getBoundingClientRect();
      const cellBottom=cellRect.bottom;
      const MORE_H=20; // +N더 높이 여유
      let lastVisible=pills.length;
      for(let i=0;i<pills.length;i++){
        const pillRect=pills[i].getBoundingClientRect();
        const moreNeeded=i<pills.length-1; // 뒤에 더 있으면 MORE_H 확보
        if(pillRect.bottom+(moreNeeded?MORE_H:0)>cellBottom-4){
          lastVisible=i;break;
        }
      }
      if(lastVisible<pills.length){
        for(let i=lastVisible;i<pills.length;i++)pills[i].style.display='none';
        cell.appendChild(createMoreEl(cell._dayEvs.slice(lastVisible)));
      }
    });
  });
}

function calDays(y,m){
  const days=[],first=new Date(y,m,1);
  const sd=first.getDay();
  for(let i=0;i<sd;i++) days.push({d:new Date(y,m,1-sd+i),cur:false});
  const dm=new Date(y,m+1,0).getDate();
  for(let d=1;d<=dm;d++) days.push({d:new Date(y,m,d),cur:true});
  let n=1;while(days.length<35) days.push({d:new Date(y,m+1,n++),cur:false});
  return days;
}

// ── EVENT EXPANSION ────────────────────────────────────────
function expandEv(e){
  if(!e.isMulti||!e.endDate||e.endDate<=e.date)return[{...e,_pos:'single',_date:e.date}];
  const r=[];let cur=e.date;
  while(cur<=e.endDate){
    r.push({...e,_pos:cur===e.date?'start':cur===e.endDate?'end':'mid',_date:cur});
    cur=addD(cur,1);
  }
  return r;
}
function recurDates(e,s,en){
  if(!e.recur)return[];
  const r=e.recur,dates=[];let cur=e.date,cnt=0;
  while(cur<=en&&cnt<400){
    cnt++;
    if(cur>=s&&cur>=e.date&&cur!==e.date)dates.push(cur);
    if(r.type==='daily')cur=addD(cur,1);
    else if(r.type==='weekly')cur=addD(cur,7);
    else if(r.type==='monthly'){const d=parseD(cur);d.setMonth(d.getMonth()+1);cur=fmt(d);}
    else if(r.type==='yearly'){const d=parseD(cur);d.setFullYear(d.getFullYear()+1);cur=fmt(d);}
    else break;
    if(r.until&&cur>r.until)break;
    if(r.count&&cnt>=r.count)break;
  }
  return dates;
}

function getEvMap(s,en){
  let all=[...events];
  if(curTeam){
    const t=teams.find(t=>t.id===curTeam);
    if(t)t.members.forEach(mb=>{
      // 시스템 사용자 연결된 팀원: localStorage에서 해당 사용자 이벤트 읽기
      if(mb.username&&mb.username!==authUser?.username){
        try{
          const mbEvs=JSON.parse(localStorage.getItem('ks_ev_'+mb.username)||'[]');
          mbEvs.forEach(e=>all.push({...e,_mb:mb}));
        }catch{}
      } else if(!mb.username&&mb.id!==curUser.id){
        // 기존 방식 (username 없는 팀원)
        (mb.events||[]).forEach(e=>all.push({...e,_mb:mb}));
      }
    });
  }
  const map={};
  all.forEach(e=>{
    expandEv(e).forEach(({_pos,_date,...rest})=>{
      if(_date>=s&&_date<=en)(map[_date]=map[_date]||[]).push({...rest,_pos,_date});
    });
    if(e.recur)recurDates(e,s,en).forEach(d=>{
      if(d>=s&&d<=en)(map[d]=map[d]||[]).push({...e,_pos:'single',_date:d,_ri:true});
    });
  });
  return map;
}

function renderMobileCell({d,ds},ebd){
  const dow=d.getDay();

  const isRed=dow===0||!!getHol(ds);
  const isSat=dow===6;

  if(isT)cc+=' mb-today';else if(isSel)cc+=' mb-sel';
  let nc='mb-dnum';
  if(isT)nc+=' is-today';else if(isRed)nc+=' is-red';else if(isSat)nc+=' is-sat';
  const dowColor=isRed?'#ef4444':isSat?'#3b82f6':'#9ca3af';
  const dayEvs=ebd[ds]||[];
  const cell=h('div',{class:cc,onClick:()=>{selDate=ds;render();}},
    h('div',{class:'mb-day-hd'},
      h('span',{class:'mb-dow',style:{color:dowColor}},DOWS[dow]),
      h('span',{class:nc},String(d.getDate()))
    ),
    ...dayEvs.slice(0,3).map(e=>makePill(e)),
    dayEvs.length>3?h('div',{class:'more-ev'},`+${dayEvs.length-3}`):null
  );
  cell.addEventListener('dblclick',ev=>{ev.stopPropagation();openAdd(ds);});

function renderMobile2Week(){
  const ws=wkStart(selDate);
  const allDays=Array.from({length:14},(_,i)=>{const ds=addD(ws,i);return{d:parseD(ds),ds};});
  const s=allDays[0].ds,en=allDays[13].ds;
  const ebd=getEvMap(s,en);
  // 7행 × 2열: 홀수=1주차, 짝수=2주차
  const cells=[];
  for(let i=0;i<7;i++){
    cells.push(renderMobileCell(allDays[i],ebd));
    cells.push(renderMobileCell(allDays[i+7],ebd));
  }
  return h('div',{class:'mb-grid'},...cells);
}

  if(!form.title.trim()){toast('제목을 입력해주세요');return;}
  if(!form.date){toast('날짜를 선택해주세요');return;}
  if(form.isMulti&&!form.endDate){toast('종료일을 선택해주세요');return;}
  if(form.isMulti&&form.endDate<form.date){toast('종료일은 시작일 이후여야 합니다');return;}
  const ev={...form,title:form.title.trim(),owner:curUser.name};
  if(modalMode==='edit'&&editEv){
    events=events.map(e=>e.id===editEv.id?{...e,...ev}:e);
    toast('수정되었습니다 ✏️');
  }else{
    events.push({id:uid(),...ev});
    toast('추가되었습니다 ✅');
  }
  ss('ev',events);modalMode=null;render();
}
function delEv(id){events=events.filter(e=>e.id!==id);ss('ev',events);modalMode=null;toast('삭제되었습니다 🗑️');render();}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}

// ── H HELPER ───────────────────────────────────────────────
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class')el.className=v;
    else if(k.startsWith('on')&&typeof v==='function')el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if((k==='checked'||k==='selected')&&typeof v==='boolean'){if(v)el.setAttribute(k,k);}
    else if(k==='value'&&(tag==='input'||tag==='select'||tag==='textarea'))el.value=v||'';
    else el.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return el;
}

// ── PILL FACTORY ───────────────────────────────────────────
function makePill(e){
  const pos=e._pos||'single';
  // 팀원 일정은 팀원 색상으로 표시, 내 일정은 강조 여부로 표시
  const mbColor=e._mb?e._mb.color:null;
  const evColor=mbColor||(e.emphasis?(e.color||'#ede9fe'):null);
  let cls='ev-pill';
  if(!evColor)cls+=' ev-none';
  if(e.id===selEvId)cls+=' ev-sel';
  if(pos==='start')cls+=' sp-start';
  else if(pos==='mid')cls+=' sp-mid';
  else if(pos==='end')cls+=' sp-end';
  const st={};
  if(evColor){
    st.background=evColor;
    st.borderColor=mbColor?mbColor:evColor;
    if(mbColor)st.color='white'; // 팀원 색상일 때 글자 흰색
  }
  const mbTag=e._mb?` [${e._mb.name}]`:'';
  const recTag=e._ri?' 🔁':'';
  const label=pos==='start'&&e.isMulti?'↔ '+e.title+mbTag+recTag:pos==='end'&&e.isMulti?e.title+' ↩'+mbTag+recTag:(e.startTime?e.startTime+' ':'')+e.title+mbTag+recTag;
  const pill=h('div',{class:cls,style:st},label);
  pill.addEventListener('click',ev=>{ev.stopPropagation();selEvId=e.id;render();});
  pill.addEventListener('dblclick',ev=>{ev.stopPropagation();e._mb?null:openDetail(e);}); // 팀원 일정은 수정 불가
  return pill;
}

        e._mb?h('div',{class:'det-row'},h('span',{},'👤 '),h('div',{class:'m-avatar',style:{background:e._mb.color||'#4f46e5'}},e._mb.name.slice(0,1)),h('span',{style:{marginLeft:'4px'}},e._mb.name)):null,
        e.recur?h('div',{class:'det-row'},h('span',{},'🔁 '),h('span',{},{daily:'매일',weekly:'매주',monthly:'매월(양력)',monthly_lunar:'매월(음력)',yearly:'매년(양력)',yearly_lunar:'매년(음력)'}[e.recur.type]+'반복'+(e.recur.until?' · ~'+e.recur.until:''))):null,
        e.memo?h('div',{},h('div',{style:{fontSize:'.72rem',fontWeight:600,color:'#6b7280',marginBottom:'5px'}},'📝 메모'),h('div',{class:'det-memo'},e.memo)):null,
        e.photo?h('img',{class:'det-img',src:e.photo,alt:'첨부'}):null
      ),
      h('div',{class:'modal-ft'},
        h('button',{class:'btn bd',onClick:()=>delEv(e.id)},'삭제'),
        h('button',{class:'btn bs',onClick:closeModal},'닫기'),
        h('button',{class:'btn bp',onClick:()=>openEdit(e)},'수정')
      )
    )
  );
}


// ── SETTINGS MODAL ─────────────────────────────────────────
function renderSettings(){
  function tog(key,label){
    const sw=h('label',{class:'sw'},(()=>{const i=h('input',{type:'checkbox'});i.checked=settings[key];i.addEventListener('change',e=>{settings[key]=e.target.checked;ss('st',settings);render();});return i;})(),h('span',{class:'sw-sl'}));
    return h('div',{class:'tog-row'},h('span',{class:'tog-label'},label),sw);
  }
  return h('div',{class:'overlay',onClick:closeModal},
    h('div',{class:'modal',style:{maxWidth:'360px'},onClick:e=>e.stopPropagation()},
      h('div',{class:'modal-hd'},h('h2',{},'⚙️ 설정'),h('button',{class:'mc',onClick:closeModal},'×')),
      h('div',{class:'modal-body'},
        h('div',{class:'s-section'},
          h('div',{class:'s-title'},'달력 표시'),
          tog('showLunar','음력 표시'),
          tog('showHol','공휴일/국경일 표시')
        ),
        h('div',{class:'s-section'},
          h('div',{class:'s-title'},'내 정보'),
          h('div',{class:'fg'},h('label',{class:'fl'},'이름'),
            h('div',{class:'fi',style:{background:'#f9fafb',color:'#374151',cursor:'default',display:'flex',alignItems:'center'}},
              authUser?authUser.username:curUser.name
            )
          )
        ),
        // ── 패스워드 변경 (모든 사용자) ──
        h('div',{class:'s-section'},
          h('div',{class:'s-title'},'🔒 내 비밀번호 변경'),
          (()=>{
            const op=h('input',{class:'fi',type:'password',placeholder:'현재 비밀번호'});
            const np=h('input',{class:'fi',type:'password',placeholder:'새 비밀번호'});
            const np2=h('input',{class:'fi',type:'password',placeholder:'새 비밀번호 확인'});
            const btn=h('button',{class:'btn bp',style:{marginTop:'6px'},onClick:()=>{
              const users=getUsers();
              const me=users.find(u=>u.username===authUser.username);
              if(!me||me.password!==op.value){toast('현재 비밀번호가 올바르지 않습니다.');return;}
              if(!np.value){toast('새 비밀번호를 입력하세요.');return;}
              if(np.value!==np2.value){toast('새 비밀번호가 일치하지 않습니다.');return;}
              me.password=np.value;saveUsers(users);
              op.value='';np.value='';np2.value='';
              toast('✅ 비밀번호가 변경되었습니다.');
            }},'변경');
            return h('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}},op,np,np2,btn);
          })()
        ),
        // ── 사용자 관리 (관리자 전용) ──
        isAdmin()?h('div',{class:'s-section'},
          h('div',{class:'s-title'},'👥 사용자 관리 (관리자)'),
          (()=>{
            const users=getUsers();
            const list=h('div',{style:{display:'flex',flexDirection:'column',gap:'4px',marginBottom:'10px'}},
              ...users.map(u=>h('div',{style:{display:'flex',alignItems:'center',gap:'6px',padding:'5px 8px',background:'#f9fafb',borderRadius:'7px'}},
                h('span',{style:{flex:1,fontSize:'.82rem',fontWeight:600}},u.username+(u.role==='admin'?' 👑':'')),
                // 비밀번호 초기화 (자기 자신 제외)
                u.username!==authUser.username?h('button',{class:'btn bs',style:{fontSize:'.7rem',padding:'2px 7px'},onClick:()=>{
                  const pw=prompt(`"${u.username}" 새 비밀번호 입력:`);
                  if(!pw)return;
                  u.password=pw;saveUsers(users);toast(`✅ ${u.username} 비밀번호 변경됨`);render();
                }},'비번변경'):null,
                // 삭제 (자기 자신과 admin 제외)
                u.username!==authUser.username&&u.username!=='admin'?h('button',{class:'btn bd',style:{fontSize:'.7rem',padding:'2px 7px'},onClick:()=>{
                  if(!confirm(`"${u.username}" 삭제?`))return;
                  const idx=users.indexOf(u);users.splice(idx,1);saveUsers(users);toast(`🗑️ ${u.username} 삭제됨`);render();
                }},'삭제'):null
              ))
            );
            // 새 사용자 추가
            const nu=h('input',{class:'fi',placeholder:'사용자명'});
            const np=h('input',{class:'fi',type:'password',placeholder:'비밀번호'});
            const addBtn=h('button',{class:'btn bp',style:{marginTop:'4px'},onClick:()=>{
              const uname=nu.value.trim();const pw=np.value;
              if(!uname||!pw){toast('사용자명과 비밀번호를 입력하세요.');return;}
              const all=getUsers();
              if(all.find(x=>x.username===uname)){toast('이미 존재하는 사용자명입니다.');return;}
              const roleEl=document.getElementById('new-user-role');
              all.push({username:uname,password:pw,role:roleEl?roleEl.value:'user'});
              saveUsers(all);nu.value='';np.value='';toast(`✅ "${uname}" 추가됨`);render();
            }},'+ 사용자 추가');
            const roleSelect=document.createElement('select');
            roleSelect.id='new-user-role';roleSelect.className='fi';roleSelect.style.padding='6px 8px';
            const o1=document.createElement('option');o1.value='user';o1.textContent='일반 사용자';
            const o2=document.createElement('option');o2.value='admin';o2.textContent='관리자';
            roleSelect.appendChild(o1);roleSelect.appendChild(o2);
            return h('div',{},
              list,
              h('div',{class:'s-title',style:{marginTop:'8px'}},'새 사용자 추가'),
              h('div',{style:{display:'flex',flexDirection:'column',gap:'5px'}},nu,np,roleSelect,addBtn)
            );
          })()
        ):null
      ),
      h('div',{class:'modal-ft'},h('button',{class:'btn bp',onClick:closeModal},'확인'))
    )
  );
}

// ── TEAM MODAL ─────────────────────────────────────────────
function renderTeam(){
  const sysUsers=getUsers();
  return h('div',{class:'overlay',onClick:closeModal},
    h('div',{class:'modal wide',onClick:e=>e.stopPropagation()},
      h('div',{class:'modal-hd'},h('h2',{},'👥 팀 공동 일정'),h('button',{class:'mc',onClick:closeModal},'×')),
      h('div',{class:'modal-body'},
        h('div',{style:{fontSize:'.8rem',color:'#6b7280',marginBottom:'4px',lineHeight:1.5}},'팀을 만들어 일정을 공유하세요. 팀원의 이름·색상으로 누구의 일정인지 식별할 수 있습니다.'),
        h('div',{class:'fg'},h('label',{class:'fl'},'새 팀 만들기'),
          h('div',{style:{display:'flex',gap:'7px'}},(()=>{
            const inp=h('input',{class:'fi',placeholder:'팀 이름'});
            const btn=h('button',{class:'btn bp',style:{whiteSpace:'nowrap'},onClick:()=>{
              const nm=inp.value.trim();if(!nm){toast('팀 이름을 입력하세요');return;}
              const team={id:uid(),name:nm,members:[{id:curUser.id||uid(),name:authUser?authUser.username:curUser.name,username:authUser?authUser.username:null,color:curUser.color,events:[]}]};
              teams.push(team);ss('teams',teams);
              curTeam=team.id;ss('curTeam',curTeam);
              toast('팀 생성 🎉');render();
            }},'생성');
            return[inp,btn];
          })())
        ),
        teams.length>0?h('div',{},
          h('div',{class:'fl',style:{marginBottom:'7px',marginTop:'4px'}},'팀 목록'),
          h('div',{class:'team-list'},...teams.map(team=>
            h('div',{class:'t-item'+(curTeam===team.id?' t-active':''),onClick:()=>{curTeam=curTeam===team.id?null:team.id;ss('curTeam',curTeam);render();}},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}},
                h('span',{style:{fontWeight:700,fontSize:'.84rem'}},team.name),
                h('span',{style:{fontSize:'.7rem',color:curTeam===team.id?'#4f46e5':'#9ca3af'}},curTeam===team.id?'✓ 활성화 중':'클릭하여 활성화')
              ),
              // 팀원 목록
              h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'8px'}},...team.members.map(mb=>
                h('div',{style:{display:'flex',alignItems:'center',gap:'5px',padding:'3px 7px',background:'#f3f4f6',borderRadius:'10px'}},
                  h('div',{class:'m-avatar',style:{background:mb.color||'#4f46e5',width:'18px',height:'18px',fontSize:'.6rem'}},mb.name.slice(0,1)),
                  h('span',{style:{fontSize:'.76rem',color:'#374151'}},mb.name+(mb.username===authUser?.username?' (나)':mb.id===curUser.id?' (나)':'')+(mb.username?' 🔗':''))
                )
              )),
              // 시스템 사용자 팀에 추가 (관리자 또는 팀원이면 가능)
              h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}},(()=>{
                // 아직 팀에 없는 시스템 사용자 목록
                const notInTeam=sysUsers.filter(u=>!team.members.find(m=>m.username===u.username));
                if(notInTeam.length===0) return [h('span',{style:{fontSize:'.72rem',color:'#9ca3af'}},'모든 사용자가 팀에 포함되어 있습니다.')];
                const sel=document.createElement('select');
                sel.className='fi';sel.style.fontSize='.76rem';sel.style.padding='3px 6px';
                notInTeam.forEach(u=>{
                  const o=document.createElement('option');o.value=u.username;o.textContent=u.username+(u.role==='admin'?' 👑':'');sel.appendChild(o);
                });
                const addBtn=h('button',{class:'btn bs',style:{fontSize:'.72rem',padding:'4px 9px',whiteSpace:'nowrap'},onClick:e=>{
                  e.stopPropagation();
                  const uname=sel.value;if(!uname)return;
                  const color=MEMBER_COLORS[team.members.length%MEMBER_COLORS.length];
                  team.members.push({id:uid(),name:uname,username:uname,color,events:[]});
                  ss('teams',teams);toast(`${uname}님 팀에 추가`);render();
                }},'+ 사용자 추가');
                return[sel,addBtn];
              })())
            )
          ))
        ):h('div',{style:{textAlign:'center',padding:'20px',color:'#9ca3af',fontSize:'.8rem'}},'팀이 없습니다. 새 팀을 만들어보세요.')
      ),
      h('div',{class:'modal-ft'},h('button',{class:'btn bp',onClick:closeModal},'확인'))
    )
  );
}

// ── MAIN RENDER ────────────────────────────────────────────
let mc=null;
function renderModal(){
  if(!mc){mc=document.createElement('div');document.body.appendChild(mc);}
  mc.innerHTML='';
  if(modalMode==='add'||modalMode==='edit')mc.appendChild(renderAddEdit());
  else if(modalMode==='detail')mc.appendChild(renderDetail());
  else if(modalMode==='settings')mc.appendChild(renderSettings());
  else if(modalMode==='team')mc.appendChild(renderTeam());
}

function render(){
  removePop();
  const root=document.getElementById('app');root.innerHTML='';
  const mob=isMobile();
  if(mob){
    const viewEl=renderMobile2Week();
    root.appendChild(h('div',{class:'app'},renderMobileTopbar(),viewEl));
  }else{
    const viewEl=viewMode==='month'?renderMonth():viewMode==='2week'?render2Week():renderDay();
    root.appendChild(h('div',{class:'app'},
      renderTopbar(),
      h('div',{class:'body'},renderSidebar(),h('div',{class:'main'},viewEl))
    ));
    if(viewMode==='month')adjustMonthOverflow();
  }
  renderModal();
}

// 창 크기 변경 시 overflow 재계산
let _wasMobile=isMobile();
let _resizeTimer=null;
window.addEventListener('resize',()=>{
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(()=>{
    if(modalMode)return; // 모달 열려 있으면 무시
    const mob=isMobile();
    if(mob!==_wasMobile){_wasMobile=mob;if(authUser)render();}
    else if(!mob&&viewMode==='month')adjustMonthOverflow();
  },300);
});

// ── 앱 시작 ─────────────────────────────────
(function initApp(){
  if(fDb){
    // Firebase에서 사용자 목록 로드 → localStorage와 병합
    fDb.ref('kong_app/users').get().then(snap=>{
      if(snap.exists()){
        const fbUsers=snap.val()||[];
        if(Array.isArray(fbUsers)&&fbUsers.length>0){
          // admin은 항상 보장
          if(!fbUsers.find(u=>u.username==='admin'))fbUsers.unshift({username:'admin',password:'8432',role:'admin'});
          localStorage.setItem('ks_auth_users',JSON.stringify(fbUsers));
        }
      }else{
        // Firebase에 사용자 없음 → localStorage 사용자를 Firebase에 업로드 (최초 1회 마이그레이션)
        const localUsers=getUsers();
        if(localUsers.length>0)fDb.ref('kong_app/users').set(localUsers).catch(()=>{});
      }
      if(authUser){
        // curUser.name 동기화
        if(curUser.name!==authUser.username){curUser.name=authUser.username;ss('curUser',curUser);}
        // 세션 존재 → Firebase에서 events/teams 로드
        Promise.all([
          fDb.ref('kong_app/events/'+authUser.username).get(),
          fDb.ref('kong_app/teams').get()
        ]).then(([evSnap,tmSnap])=>{
          if(evSnap.exists()&&Array.isArray(evSnap.val())){events=evSnap.val();ss('ev',events);}
          if(tmSnap.exists()&&Array.isArray(tmSnap.val())){teams=tmSnap.val();ss('teams',teams);}
          render();
        }).catch(()=>render());
      }else{showLoginScreen();}
    }).catch(()=>{
      if(authUser){render();}else{showLoginScreen();}
    });
  }else{
    if(authUser){render();}else{showLoginScreen();}
  }
})();
</script>
